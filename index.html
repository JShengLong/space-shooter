<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太空射击</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
canvas {
  border: 2px solid #0ff;
  box-shadow: 0 0 20px rgba(0,255,255,0.3);
}
#ui {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #0ff;
  font-size: 18px;
  text-shadow: 0 0 10px #0ff;
  z-index: 10;
  display: flex;
  gap: 30px;
}
#gameOver, #startScreen {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  text-align: center;
  z-index: 20;
}
#startScreen h1 { font-size: 48px; color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 20px; }
#gameOver h1 { font-size: 48px; color: #f44; text-shadow: 0 0 20px #f44; margin-bottom: 10px; }
#gameOver p, #startScreen p { font-size: 20px; margin: 10px 0; color: #aaa; }
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 40px;
  font-size: 20px;
  background: transparent;
  color: #0ff;
  border: 2px solid #0ff;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.3s;
}
.btn:hover { background: #0ff; color: #000; }
.hidden { display: none !important; }
#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #555;
  font-size: 14px;
  z-index: 10;
}
</style>
</head>
<body>

<div id="ui" class="hidden">
  <span>分数: <span id="score">0</span></span>
  <span>生命: <span id="lives">3</span></span>
  <span>波次: <span id="wave">1</span></span>
</div>

<canvas id="game"></canvas>

<div id="startScreen">
  <h1>🚀 太空射击</h1>
  <p>WASD / 方向键 移动</p>
  <p>空格 / 鼠标点击 射击</p>
  <button class="btn" onclick="startGame()">开始游戏</button>
</div>

<div id="gameOver" class="hidden">
  <h1>💀 游戏结束</h1>
  <p>最终得分: <span id="finalScore">0</span></p>
  <p>最高波次: <span id="finalWave">1</span></p>
  <button class="btn" onclick="startGame()">再来一局</button>
</div>

<div id="controls">WASD/方向键移动 · 空格/点击射击 · 消灭敌人进入下一波</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 适配屏幕
function resize() {
  canvas.width = Math.min(window.innerWidth - 40, 600);
  canvas.height = Math.min(window.innerHeight - 40, 800);
}
resize();
window.addEventListener('resize', resize);

// 游戏状态
let player, bullets, enemies, particles, powerups;
let score, lives, wave, gameRunning, spawnTimer, waveEnemies, enemiesKilled;
let keys = {};
let mouseX = 0, mouseY = 0, useMouse = false;
let stars = [];

// 星空背景
function initStars() {
  stars = [];
  for (let i = 0; i < 100; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      speed: 0.5 + Math.random() * 2,
      size: Math.random() * 2,
      alpha: 0.3 + Math.random() * 0.7
    });
  }
}

function updateStars() {
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
  });
}

function drawStars() {
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
}

// 玩家
function createPlayer() {
  return {
    x: canvas.width / 2,
    y: canvas.height - 80,
    w: 40,
    h: 40,
    speed: 5,
    fireRate: 12,
    fireCooldown: 0,
    tripleShot: 0,
    invincible: 0
  };
}

function drawPlayer() {
  const p = player;
  if (p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0) return;

  ctx.save();
  ctx.translate(p.x, p.y);

  // 机身
  ctx.fillStyle = '#0ff';
  ctx.beginPath();
  ctx.moveTo(0, -p.h / 2);
  ctx.lineTo(-p.w / 2, p.h / 2);
  ctx.lineTo(-p.w / 4, p.h / 3);
  ctx.lineTo(p.w / 4, p.h / 3);
  ctx.lineTo(p.w / 2, p.h / 2);
  ctx.closePath();
  ctx.fill();

  // 驾驶舱
  ctx.fillStyle = '#003';
  ctx.beginPath();
  ctx.ellipse(0, -2, 6, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // 引擎火焰
  const flicker = 0.6 + Math.random() * 0.4;
  ctx.fillStyle = `rgba(255,${Math.floor(100 + Math.random() * 155)},0,${flicker})`;
  ctx.beginPath();
  ctx.moveTo(-8, p.h / 3);
  ctx.lineTo(0, p.h / 3 + 15 + Math.random() * 10);
  ctx.lineTo(8, p.h / 3);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// 子弹
function createBullet(x, y, angle = -Math.PI / 2) {
  return {
    x, y,
    vx: Math.cos(angle) * 8,
    vy: Math.sin(angle) * 8,
    size: 3,
    color: '#0ff'
  };
}

function updateBullets() {
  bullets = bullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    return b.y > -10 && b.y < canvas.height + 10 && b.x > -10 && b.x < canvas.width + 10;
  });
}

function drawBullets() {
  bullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 10;
    ctx.fillRect(b.x - b.size / 2, b.y - b.size * 2, b.size, b.size * 4);
    ctx.shadowBlur = 0;
  });
}

// 敌人类型
const ENEMY_TYPES = [
  { name: 'basic', w: 30, h: 30, hp: 1, speed: 1.5, color: '#f44', score: 10, shoots: false },
  { name: 'fast', w: 24, h: 24, hp: 1, speed: 3, color: '#ff0', score: 15, shoots: false },
  { name: 'tank', w: 40, h: 40, hp: 3, speed: 0.8, color: '#f0f', score: 30, shoots: true },
  { name: 'boss', w: 60, h: 50, hp: 10, speed: 0.5, color: '#f80', score: 100, shoots: true }
];

function createEnemy(type) {
  const t = ENEMY_TYPES[type];
  return {
    x: 30 + Math.random() * (canvas.width - 60),
    y: -40,
    w: t.w,
    h: t.h,
    hp: t.hp,
    maxHp: t.hp,
    speed: t.speed + wave * 0.1,
    color: t.color,
    score: t.score,
    shoots: t.shoots,
    shootTimer: 60 + Math.random() * 120,
    wobble: Math.random() * Math.PI * 2
  };
}

function updateEnemies() {
  enemies.forEach(e => {
    e.y += e.speed;
    e.wobble += 0.03;
    e.x += Math.sin(e.wobble) * 0.8;

    if (e.shoots) {
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        bullets.push({
          x: e.x, y: e.y + e.h / 2,
          vx: Math.cos(angle) * 4,
          vy: Math.sin(angle) * 4,
          size: 4, color: '#f44'
        });
        e.shootTimer = 80 + Math.random() * 80;
      }
    }
  });

  enemies = enemies.filter(e => e.y < canvas.height + 50 && e.hp > 0);
}

function drawEnemies() {
  enemies.forEach(e => {
    ctx.save();
    ctx.translate(e.x, e.y);

    // 身体
    ctx.fillStyle = e.color;
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(0, -e.h / 2);
    ctx.lineTo(-e.w / 2, e.h / 3);
    ctx.lineTo(-e.w / 3, e.h / 2);
    ctx.lineTo(e.w / 3, e.h / 2);
    ctx.lineTo(e.w / 2, e.h / 3);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // 眼睛
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-6, -2, 3, 0, Math.PI * 2);
    ctx.arc(6, -2, 3, 0, Math.PI * 2);
    ctx.fill();

    // 血条
    if (e.maxHp > 1) {
      const bw = e.w * 0.8;
      ctx.fillStyle = '#300';
      ctx.fillRect(-bw / 2, -e.h / 2 - 8, bw, 4);
      ctx.fillStyle = '#0f0';
      ctx.fillRect(-bw / 2, -e.h / 2 - 8, bw * (e.hp / e.maxHp), 4);
    }

    ctx.restore();
  });
}

// 爆炸粒子
function createExplosion(x, y, color, count = 15) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// 道具
function createPowerup(x, y) {
  const types = ['triple', 'heal', 'speed'];
  return {
    x, y,
    type: types[Math.floor(Math.random() * types.length)],
    vy: 1.5,
    size: 14,
    timer: 0
  };
}

function updatePowerups() {
  powerups.forEach(p => {
    p.y += p.vy;
    p.timer += 0.1;
  });
  powerups = powerups.filter(p => p.y < canvas.height + 20);
}

function drawPowerups() {
  powerups.forEach(p => {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.timer);

    const colors = { triple: '#0ff', heal: '#0f0', speed: '#ff0' };
    ctx.strokeStyle = colors[p.type];
    ctx.shadowColor = colors[p.type];
    ctx.shadowBlur = 10;
    ctx.lineWidth = 2;
    ctx.strokeRect(-p.size / 2, -p.size / 2, p.size, p.size);

    ctx.shadowBlur = 0;
    ctx.fillStyle = colors[p.type];
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const labels = { triple: 'T', heal: '+', speed: 'S' };
    ctx.fillText(labels[p.type], 0, 0);

    ctx.restore();
  });
}

// 碰撞检测
function rectCollide(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.size || 6) / 2 &&
         Math.abs(a.y - b.y) < (a.h + b.size || 6) / 2;
}

// 输入
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' && gameRunning) {
    e.preventDefault();
    shoot();
  }
});
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
  useMouse = true;
});
canvas.addEventListener('click', () => { if (gameRunning) shoot(); });

// 触屏支持
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  mouseX = t.clientX - r.left;
  mouseY = t.clientY - r.top;
  useMouse = true;
  if (gameRunning) shoot();
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  mouseX = t.clientX - r.left;
  mouseY = t.clientY - r.top;
});

function shoot() {
  if (player.fireCooldown > 0) return;
  player.fireCooldown = player.fireRate;

  if (player.tripleShot > 0) {
    bullets.push(createBullet(player.x, player.y - player.h / 2, -Math.PI / 2));
    bullets.push(createBullet(player.x - 10, player.y - player.h / 2, -Math.PI / 2 - 0.2));
    bullets.push(createBullet(player.x + 10, player.y - player.h / 2, -Math.PI / 2 + 0.2));
  } else {
    bullets.push(createBullet(player.x, player.y - player.h / 2));
  }
}

// 移动玩家
function movePlayer() {
  const p = player;
  let dx = 0, dy = 0;

  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;

  if (useMouse) {
    const mx = mouseX - p.x;
    const my = mouseY - p.y;
    const dist = Math.sqrt(mx * mx + my * my);
    if (dist > 5) {
      dx = mx / dist;
      dy = my / dist;
    }
  }

  if (dx || dy) {
    const len = Math.sqrt(dx * dx + dy * dy);
    p.x += (dx / len) * p.speed;
    p.y += (dy / len) * p.speed;
  }

  p.x = Math.max(p.w / 2, Math.min(canvas.width - p.w / 2, p.x));
  p.y = Math.max(p.h / 2, Math.min(canvas.height - p.h / 2, p.y));

  if (p.fireCooldown > 0) p.fireCooldown--;
  if (p.tripleShot > 0) p.tripleShot--;
  if (p.invincible > 0) p.invincible--;

  // 自动射击（按住空格）
  if (keys[' ']) shoot();
}

// 波次管理
function spawnEnemies() {
  spawnTimer--;
  if (spawnTimer <= 0 && waveEnemies > 0) {
    let type = 0;
    const r = Math.random();
    if (wave >= 3 && r < 0.15) type = 2; // tank
    else if (wave >= 2 && r < 0.35) type = 1; // fast

    enemies.push(createEnemy(type));
    waveEnemies--;
    spawnTimer = Math.max(20, 60 - wave * 3);
  }

  // 波次 Boss
  if (waveEnemies === 0 && enemies.length === 0 && wave % 3 === 0 && !wave.bossSpawned) {
    enemies.push(createEnemy(3)); // boss
    wave.bossSpawned = true;
  }

  // 下一波
  if (waveEnemies === 0 && enemies.length === 0) {
    wave++;
    waveEnemies = 5 + wave * 3;
    wave.bossSpawned = false;
    document.getElementById('wave').textContent = wave;
  }
}

// 碰撞处理
function handleCollisions() {
  // 子弹 vs 敌人
  bullets = bullets.filter(b => {
    if (b.color !== '#0ff') return true; // 只处理玩家子弹
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (Math.abs(b.x - e.x) < e.w / 2 && Math.abs(b.y - e.y) < e.h / 2) {
        e.hp--;
        createExplosion(b.x, b.y, '#fff', 5);
        if (e.hp <= 0) {
          score += e.score;
          document.getElementById('score').textContent = score;
          createExplosion(e.x, e.y, e.color, 20);
          enemies.splice(i, 1);
          enemiesKilled++;
          // 掉落道具
          if (Math.random() < 0.15) powerups.push(createPowerup(e.x, e.y));
        }
        return false;
      }
    }
    return true;
  });

  // 敌人子弹 vs 玩家
  if (player.invincible <= 0) {
    bullets = bullets.filter(b => {
      if (b.color === '#0ff') return true;
      if (Math.abs(b.x - player.x) < player.w / 2 && Math.abs(b.y - player.y) < player.h / 2) {
        lives--;
        document.getElementById('lives').textContent = lives;
        player.invincible = 90;
        createExplosion(player.x, player.y, '#0ff', 10);
        if (lives <= 0) endGame();
        return false;
      }
      return true;
    });
  }

  // 敌人 vs 玩家
  if (player.invincible <= 0) {
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (rectCollide(player, e)) {
        lives--;
        e.hp--;
        document.getElementById('lives').textContent = lives;
        player.invincible = 90;
        createExplosion(player.x, player.y, '#0ff', 15);
        if (e.hp <= 0) {
          createExplosion(e.x, e.y, e.color, 20);
          enemies.splice(i, 1);
        }
        if (lives <= 0) endGame();
        break;
      }
    }
  }

  // 道具 vs 玩家
  powerups = powerups.filter(p => {
    if (Math.abs(p.x - player.x) < 25 && Math.abs(p.y - player.y) < 25) {
      if (p.type === 'triple') player.tripleShot = 300;
      else if (p.type === 'heal') { lives = Math.min(5, lives + 1); document.getElementById('lives').textContent = lives; }
      else if (p.type === 'speed') player.speed = 7;
      setTimeout(() => player.speed = 5, 5000);
      createExplosion(p.x, p.y, '#0f0', 10);
      return false;
    }
    return true;
  });
}

// 游戏循环
function gameLoop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 背景
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  updateStars();
  drawStars();

  movePlayer();
  spawnEnemies();
  updateBullets();
  updateEnemies();
  updatePowerups();
  handleCollisions();
  updateParticles();

  drawPowerups();
  drawBullets();
  drawEnemies();
  drawPlayer();
  drawParticles();

  requestAnimationFrame(gameLoop);
}

function startGame() {
  player = createPlayer();
  bullets = [];
  enemies = [];
  particles = [];
  powerups = [];
  score = 0;
  lives = 3;
  wave = 1;
  spawnTimer = 60;
  waveEnemies = 8;
  enemiesKilled = 0;
  gameRunning = true;

  initStars();

  document.getElementById('score').textContent = '0';
  document.getElementById('lives').textContent = '3';
  document.getElementById('wave').textContent = '1';
  document.getElementById('ui').classList.remove('hidden');
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOver').classList.add('hidden');

  gameLoop();
}

function endGame() {
  gameRunning = false;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalWave').textContent = wave;
  document.getElementById('gameOver').classList.remove('hidden');
  document.getElementById('ui').classList.add('hidden');
}

// 初始化星空
initStars();
</script>
</body>
</html>
